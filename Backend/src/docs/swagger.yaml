openapi: 3.0.0
info:
  title: Users API
  version: 1.0.0

servers:
  - url: http://localhost:4001/api

paths:
  /users:
    get:
      summary: Get all users
      responses:
        200:
          description: Users list

    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        201:
          description: User created

  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User found

    put:
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:                # ✅ THIS WAS MISSING
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        200:
          description: User updated

    delete:
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User deleted

components:
  schemas:
    User:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        class:
          type: string
        address:
          type: string
        mobilenumber:
          type: string
        username:
          type: string
        password:
          type: string
        level:
          type: string
        dob:
          type: string
          format: date
        usertype:
          type: string
        status:
          type: integer


# =====================================================
# = Additional Swagger Documentation for Questions API =
# =====================================================

  /questions:
    get:
      summary: Get all questions
      responses:
        200:
          description: Question list

    post:
      summary: Create question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Question'
      responses:
        201:
          description: Question created

  /questions/{id}:
    put:
      summary: Update question
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Question'
      responses:
        200:
          description: Question updated

    delete:
      summary: Delete question
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Question deleted
