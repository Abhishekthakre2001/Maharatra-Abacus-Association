paths:
  /districts:
    get:
      tags: [Districts]
      summary: Get all districts (pagination + search)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            example: 1
        - in: query
          name: limit
          schema:
            type: integer
            example: 10
        - in: query
          name: search
          schema:
            type: string
            example: nagpur
      responses:
        200:
          description: District list

    post:
      tags: [Districts]
      summary: Create district
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Nagpur
              state_id: 1
              prant_id: 2
      responses:
        201:
          description: District created

  /districts/{id}:
    get:
      tags: [Districts]
      summary: Get district by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: District found

    put:
      tags: [Districts]
      summary: Update district
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Updated District
              state_id: 2
      responses:
        200:
          description: District updated

    delete:
      tags: [Districts]
      summary: Delete district
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: District deleted

  /districts/export:
    get:
      tags: [Districts]
      summary: Export districts (JSON/CSV)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
            example: csv
      responses:
        200:
          description: Exported data