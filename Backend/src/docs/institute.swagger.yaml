paths:
  /institute:
    get:
      tags: [Institute]
      summary: Get all institutes (pagination + search)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            example: 1
        - in: query
          name: limit
          schema:
            type: integer
            example: 10
        - in: query
          name: search
          schema:
            type: string
            example: abc school
      responses:
        200:
          description: Institute list with pagination

    post:
      tags: [Institute]
      summary: Create institute
      requestBody:
        required: true
        content:
          application/json:
            example:
              institute_name: ABC School
              institute_contact: "9876543210"
              country_id: 1
              state_id: 2
              district_id: 3
              city: Nagpur
              address: Main Road, Civil Lines
              pincode: "440001"
              is_active: 1
      responses:
        201:
          description: Institute created

  /institute/{id}:
    get:
      tags: [Institute]
      summary: Get institute by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Institute details

    put:
      tags: [Institute]
      summary: Update institute
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              institute_name: Updated School
              institute_contact: "9999999999"
              city: Pune
              address: Updated Address
              pincode: "411001"
      responses:
        200:
          description: Institute updated

    delete:
      tags: [Institute]
      summary: Delete institute
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Institute deleted

  /institute/export:
    get:
      tags: [Institute]
      summary: Export institutes (JSON / CSV)
      parameters:
        - in: query
          name: search
          schema:
            type: string
            example: school
        - in: query
          name: format
          schema:
            type: string
            example: csv
      responses:
        200:
          description: Exported institute data